[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install --legacy-peer-deps && npm run build && cd ../backend && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
restartPolicyType = "on_failure"
